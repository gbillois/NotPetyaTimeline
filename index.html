// Orthographic "globe" map — much cleaner continents, auto-rotates to
// focus on the active event's longitude. Pulses fire at event hotspots.

const Globe = ({ events, currentTime, activeEvent }) => {
  const size = 460; // virtual size, SVG is responsive
  const cx = size / 2, cy = size / 2;
  const R = size * 0.46;

  // Target longitude: active event's, so the globe rotates to face it
  const targetLon = activeEvent?.coords?.[1] ?? 20;
  const targetLat = activeEvent?.coords?.[0] ?? 30;

  const [rot, setRot] = React.useState({ lon: targetLon, lat: targetLat });
  const rafRef = React.useRef(null);
  React.useEffect(() => {
    const tl = targetLon, tla = Math.max(-60, Math.min(60, targetLat * 0.35));
    const animate = () => {
      setRot(prev => {
        let dl = tl - prev.lon;
        if (dl > 180) dl -= 360;
        if (dl < -180) dl += 360;
        const dla = tla - prev.lat;
        if (Math.abs(dl) < 0.1 && Math.abs(dla) < 0.1) return prev;
        return {
          lon: prev.lon + dl * 0.06,
          lat: prev.lat + dla * 0.06,
        };
      });
      rafRef.current = requestAnimationFrame(animate);
    };
    rafRef.current = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(rafRef.current);
  }, [targetLon, targetLat]);

  // Orthographic projection: returns [x, y, visible]
  const project = (lat, lon) => {
    const φ = (lat * Math.PI) / 180;
    const λ = ((lon - rot.lon) * Math.PI) / 180;
    const φ0 = (rot.lat * Math.PI) / 180;
    const cosc = Math.sin(φ0) * Math.sin(φ) + Math.cos(φ0) * Math.cos(φ) * Math.cos(λ);
    if (cosc < 0) return [0, 0, false];
    const x = R * Math.cos(φ) * Math.sin(λ);
    const y = R * (Math.cos(φ0) * Math.sin(φ) - Math.sin(φ0) * Math.cos(φ) * Math.cos(λ));
    return [cx + x, cy - y, true];
  };

  // Fetch real-world coastline GeoJSON once
  const [landmasses, setLandmasses] = React.useState(null);
  React.useEffect(() => {
    let cancelled = false;
    // world-atlas 110m countries via topojson from a CDN → convert to lat/lon polygons
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json')
      .then(r => r.json())
      .then(topo => {
        if (cancelled) return;
        // Minimal inline TopoJSON decoder
        const t = topo.transform;
        const sx = t.scale[0], sy = t.scale[1], tx = t.translate[0], ty = t.translate[1];
        const decodeArc = (arc) => {
          let x = 0, y = 0;
          return arc.map(([dx, dy]) => {
            x += dx; y += dy;
            return [x * sx + tx, y * sy + ty]; // [lon, lat]
          });
        };
        const arcs = topo.arcs.map(decodeArc);
        const lineFromArcIdx = (idx) => {
          const rev = idx < 0;
          const arc = arcs[rev ? ~idx : idx];
          return rev ? [...arc].reverse() : arc;
        };
        const geom = topo.objects.land;
        const polys = []; // array of rings, each ring = [[lat,lon],...]
        const addRing = (arcIdxs) => {
          const ring = [];
          arcIdxs.forEach((ai, i) => {
            const seg = lineFromArcIdx(ai);
            for (let k = i === 0 ? 0 : 1; k < seg.length; k++) {
              ring.push([seg[k][1], seg[k][0]]); // lat, lon
            }
          });
          polys.push(ring);
        };
        const walk = (g) => {
          if (g.type === 'Polygon') g.arcs.forEach(addRing);
          else if (g.type === 'MultiPolygon') g.arcs.forEach(p => p.forEach(addRing));
          else if (g.type === 'GeometryCollection') g.geometries.forEach(walk);
        };
        walk(geom);
        setLandmasses(polys);
      })
      .catch(() => { /* fallback: leave null */ });
    return () => { cancelled = true; };
  }, []);

  const now = Date.now();
  const firedEvents = events.filter(e => e.t <= currentTime && e.coords);

  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{ width: '100%', height: '100%', maxHeight: '100%' }}>
        <defs>
          <radialGradient id="oceanGrad" cx="40%" cy="40%">
            <stop offset="0%" stopColor="#1a1611" />
            <stop offset="60%" stopColor="#0a0907" />
            <stop offset="100%" stopColor="#08070a" />
          </radialGradient>
          <radialGradient id="rim" cx="50%" cy="50%">
            <stop offset="85%" stopColor="rgba(230,220,200,0)" />
            <stop offset="95%" stopColor="rgba(230,220,200,0.15)" />
            <stop offset="100%" stopColor="rgba(230,220,200,0)" />
          </radialGradient>
          <radialGradient id="shade" cx="70%" cy="70%">
            <stop offset="0%" stopColor="rgba(0,0,0,0)" />
            <stop offset="100%" stopColor="rgba(0,0,0,0.55)" />
          </radialGradient>
          <radialGradient id="pulseGrad">
            <stop offset="0%" stopColor="rgba(220,60,40,0.7)" />
            <stop offset="60%" stopColor="rgba(220,60,40,0.18)" />
            <stop offset="100%" stopColor="rgba(220,60,40,0)" />
          </radialGradient>
        </defs>

        {/* Ocean sphere */}
        <circle cx={cx} cy={cy} r={R} fill="url(#oceanGrad)" />

        {/* Graticule — longitude + latitude lines */}
        <g stroke="rgba(230,220,200,0.07)" strokeWidth="0.6" fill="none">
          {[-60,-30,0,30,60].map(lat => {
            const pts = [];
            for (let lon = -180; lon <= 180; lon += 6) {
              const [x, y, v] = project(lat, lon);
              if (v) pts.push(`${x},${y}`);
              else if (pts.length) pts.push('M');
            }
            // Split into runs
            const segments = pts.join(' ').split(' M ').filter(s => s.trim());
            return segments.map((seg, i) => (
              <polyline key={`lat${lat}-${i}`} points={seg} />
            ));
          })}
          {[-150,-120,-90,-60,-30,0,30,60,90,120,150,180].map(lon => {
            const pts = [];
            for (let lat = -85; lat <= 85; lat += 5) {
              const [x, y, v] = project(lat, lon);
              if (v) pts.push(`${x},${y}`);
              else if (pts.length) pts.push('M');
            }
            const segments = pts.join(' ').split(' M ').filter(s => s.trim());
            return segments.map((seg, i) => (
              <polyline key={`lon${lon}-${i}`} points={seg} />
            ));
          })}
        </g>

        {/* Landmasses */}
        <g>
          {(landmasses || []).map((poly, i) => {
            // Split polygon into visible runs; when a vertex flips visibility,
            // start a new sub-polyline so we don't draw across the back.
            const runs = [];
            let cur = [];
            for (const [lat, lon] of poly) {
              const [x, y, v] = project(lat, lon);
              if (v) cur.push(`${x},${y}`);
              else if (cur.length) { runs.push(cur); cur = []; }
            }
            if (cur.length) runs.push(cur);
            return runs.map((r, j) => r.length < 2 ? null : (
              <polyline
                key={`${i}-${j}`}
                points={r.join(' ')}
                fill="rgba(230,220,200,0.12)"
                stroke="rgba(230,220,200,0.55)"
                strokeWidth="0.5"
                strokeLinejoin="round"
              />
            ));
          })}
        </g>

        {/* Terminator shading — subtle vignette on far side */}
        <circle cx={cx} cy={cy} r={R} fill="url(#shade)" pointerEvents="none" />

        {/* Event pulses */}
        {firedEvents.map(evt => {
          const [x, y, visible] = project(evt.coords[0], evt.coords[1]);
          if (!visible) return null;
          const age = currentTime - evt.t;
          const ageScale = Math.max(0, 1 - age * 2.5);
          const baseR = 2 + (evt.severity || 1) * 1.1;
          const pulseR = baseR + ageScale * 22;
          const color = evt.phase === 'detonation' ? '#dc3c28'
            : evt.phase === 'prelude' ? '#d4a03c' : '#b4afa5';
          const isActive = evt.id === activeEvent?.id;
          return (
            <g key={evt.id}>
              {ageScale > 0.02 && (
                <circle cx={x} cy={y} r={pulseR} fill="url(#pulseGrad)" opacity={ageScale} />
              )}
              {isActive && (
                <circle cx={x} cy={y} r={baseR + 8} fill="none"
                        stroke={color} strokeWidth="1" opacity="0.6">
                  <animate attributeName="r" from={baseR + 4} to={baseR + 18}
                           dur="1.4s" repeatCount="indefinite" />
                  <animate attributeName="opacity" from="0.7" to="0"
                           dur="1.4s" repeatCount="indefinite" />
                </circle>
              )}
              <circle cx={x} cy={y} r={baseR} fill={color}
                      stroke="#0a0907" strokeWidth="1" />
            </g>
          );
        })}

        {/* Rim highlight */}
        <circle cx={cx} cy={cy} r={R} fill="url(#rim)" pointerEvents="none" />
        <circle cx={cx} cy={cy} r={R} fill="none"
                stroke="rgba(230,220,200,0.18)" strokeWidth="0.8" />
      </svg>
    </div>
  );
};

// Timeline track — three stacked rows:
//   1. Phase labels (top)
//   2. Year ticks
//   3. Track: phase bands + rail + event pins + playhead

const TimelineTrack = ({ events, phases, currentTime, setCurrentTime, activeId, setActiveId, playing, setPlaying }) => {
  const trackRef = React.useRef(null);
  const [hoverT, setHoverT] = React.useState(null);
  const [dragging, setDragging] = React.useState(false);

  const onMove = (e) => {
    if (!trackRef.current) return;
    const rect = trackRef.current.getBoundingClientRect();
    const t = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (dragging) setCurrentTime(t); else setHoverT(t);
  };

  const onDown = (e) => {
    if (!trackRef.current) return;
    const rect = trackRef.current.getBoundingClientRect();
    const t = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    setCurrentTime(t);
    setDragging(true);
    setPlaying(false);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const up = () => setDragging(false);
    const move = (e) => {
      if (!trackRef.current) return;
      const rect = trackRef.current.getBoundingClientRect();
      const t = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      setCurrentTime(t);
    };
    window.addEventListener('mouseup', up);
    window.addEventListener('mousemove', move);
    return () => {
      window.removeEventListener('mouseup', up);
      window.removeEventListener('mousemove', move);
    };
  }, [dragging]);

  const ticks = [
    { t: 0, label: '2013' },
    { t: 0.05, label: 'AUG ’16' },
    { t: 0.19, label: 'APR ’17' },
    { t: 0.26, label: 'MAY ’17' },
    { t: 0.44, label: 'JUN 27' },
    { t: 0.76, label: 'JUL ’17' },
    { t: 0.83, label: 'FEB ’18' },
    { t: 0.89, label: 'OCT ’20' },
    { t: 0.93, label: 'JAN ’22' },
    { t: 1, label: 'MAR ’23' },
  ];

  const phaseColorOf = (id) => id === 'prelude' ? '#d4a03c' : id === 'detonation' ? '#dc3c28' : '#b4afa5';

  return (
    <div style={{ width: '100%', padding: '0', position: 'relative' }}>
      {/* ── Row 1: Phase labels ─────────────────────────────── */}
      <div style={{ position: 'relative', height: 18, marginBottom: 4 }}>
        {phases.map(p => (
          <div key={p.id} style={{
            position: 'absolute',
            left: `${p.start * 100}%`,
            width: `${(p.end - p.start) * 100}%`,
            top: 0,
            paddingLeft: 8,
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 9,
            letterSpacing: '0.14em',
            textTransform: 'uppercase',
            color: phaseColorOf(p.id),
            fontWeight: 700,
            whiteSpace: 'nowrap',
            overflow: 'hidden',
            textOverflow: 'ellipsis',
          }}>
            <span>{p.label}</span>
            <span style={{ opacity: 0.55, marginLeft: 8, fontWeight: 500 }}>{p.range}</span>
          </div>
        ))}
      </div>

      {/* ── Row 2: Year ticks ────────────────────────────────── */}
      <div style={{
        position: 'relative', height: 16, marginBottom: 6,
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 9.5,
        color: 'rgba(230,220,200,0.45)',
        letterSpacing: '0.08em',
      }}>
        {ticks.map(tick => (
          <div key={tick.label} style={{
            position: 'absolute',
            left: `${tick.t * 100}%`,
            transform: tick.t === 1 ? 'translateX(-100%)' : tick.t === 0 ? 'translateX(0)' : 'translateX(-50%)',
            whiteSpace: 'nowrap',
          }}>
            <span style={{
              display: 'inline-block',
              borderLeft: '1px solid rgba(230,220,200,0.25)',
              paddingLeft: 4,
              paddingTop: 1,
            }}>{tick.label}</span>
          </div>
        ))}
      </div>

      {/* ── Row 3: Main track ────────────────────────────────── */}
      <div
        ref={trackRef}
        onMouseMove={onMove}
        onMouseLeave={() => setHoverT(null)}
        onMouseDown={onDown}
        style={{
          position: 'relative',
          height: 62,
          cursor: 'pointer',
          userSelect: 'none',
        }}
      >
        {/* Phase bands */}
        {phases.map(p => (
          <div key={p.id} style={{
            position: 'absolute',
            left: `${p.start * 100}%`,
            width: `${(p.end - p.start) * 100}%`,
            top: 22, height: 18,
            background: p.id === 'prelude' ? 'rgba(212,160,60,0.12)'
              : p.id === 'detonation' ? 'rgba(220,60,40,0.18)'
              : 'rgba(180,175,165,0.08)',
            borderLeft: '1px solid rgba(230,220,200,0.15)',
            borderRight: p.id === 'fallout' ? '1px solid rgba(230,220,200,0.15)' : 'none',
          }} />
        ))}

        {/* Progress fill */}
        <div style={{
          position: 'absolute',
          left: 0, width: `${currentTime * 100}%`,
          top: 22, height: 18,
          background: 'linear-gradient(90deg, rgba(212,160,60,0.35) 0%, rgba(220,60,40,0.5) 46%, rgba(180,175,165,0.25) 100%)',
          pointerEvents: 'none',
          mixBlendMode: 'screen',
        }} />

        {/* Central rail */}
        <div style={{
          position: 'absolute',
          left: 0, right: 0, top: 30, height: 2,
          background: 'rgba(230,220,200,0.25)',
          pointerEvents: 'none',
        }} />

        {/* Event pins */}
        {events.map(evt => {
          const active = evt.id === activeId;
          const fired = evt.t <= currentTime;
          const color = phaseColorOf(evt.phase);
          const stagger = (parseInt(evt.id.slice(1)) % 2 === 0) ? -1 : 1;
          return (
            <div key={evt.id}
              onClick={(e) => { e.stopPropagation(); setActiveId(evt.id); setCurrentTime(evt.t); setPlaying(false); }}
              style={{
                position: 'absolute',
                left: `${evt.t * 100}%`,
                top: stagger > 0 ? 42 : 10,
                transform: 'translateX(-50%)',
                cursor: 'pointer',
                zIndex: active ? 20 : 10,
              }}
              title={evt.title}
            >
              <div style={{
                width: active ? 12 : 8,
                height: active ? 12 : 8,
                background: fired ? color : 'transparent',
                border: `1.5px solid ${color}`,
                borderRadius: '50%',
                transition: 'all 180ms',
                boxShadow: active ? `0 0 0 4px ${color}33, 0 0 12px ${color}` : 'none',
              }} />
              <div style={{
                position: 'absolute',
                left: '50%',
                top: stagger > 0 ? -12 : 8,
                height: 14,
                width: 1,
                background: fired ? color : 'rgba(230,220,200,0.2)',
                transform: 'translateX(-50%)',
              }} />
            </div>
          );
        })}

        {/* Playhead */}
        <div style={{
          position: 'absolute',
          left: `${currentTime * 100}%`,
          top: 0, bottom: 0,
          width: 2,
          transform: 'translateX(-50%)',
          background: '#f6f1e4',
          pointerEvents: 'none',
          boxShadow: '0 0 12px rgba(246,241,228,0.6)',
        }}>
          <div style={{
            position: 'absolute',
            top: -4, left: '50%',
            transform: 'translateX(-50%)',
            width: 10, height: 10,
            background: '#f6f1e4',
            clipPath: 'polygon(0 0, 100% 0, 50% 100%)',
          }}/>
        </div>

        {hoverT !== null && !dragging && (
          <div style={{
            position: 'absolute',
            left: `${hoverT * 100}%`,
            top: 0, bottom: 0,
            width: 1,
            transform: 'translateX(-50%)',
            background: 'rgba(246,241,228,0.3)',
            pointerEvents: 'none',
          }} />
        )}
      </div>
    </div>
  );
};

      const liBottom = liTop + li.offsetHeight;
      if (liTop < ul.scrollTop) {
        ul.scrollTop = liTop - 8;

        ul.scrollTop = liBottom - ul.clientHeight + 8;

          >

            }}>
              {evt.dateLabel.split(',')[0].toUpperCase()}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{
                fontFamily: "'Inter', sans-serif",
                fontSize: 12.5,
                fontWeight: active ? 600 : 500,
                color: active ? '#f6f1e4' : fired ? '#e6dcc8' : 'rgba(230,220,200,0.45)',
                lineHeight: 1.3,
                letterSpacing: '-0.005em',
              }}>
                {evt.title}
              </div>
              <div style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 9,
                color: color + 'bb',
                letterSpacing: '0.12em',
                marginTop: 3,
                textTransform: 'uppercase',
              }}>
                {kindIcon(evt.kind)}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
};

window.EventDetail = EventDetail;
window.EventList = EventList;
window.phaseLabel = phaseLabel;
window.phaseColor = phaseColor;


// Main app — timeline hero on top (1/3 height), map + list + detail below.

const { useState, useEffect, useRef, useMemo, useCallback } = React;

const App = () => {
  const events = window.TIMELINE_EVENTS;
  const phases = window.PHASES;

  const [currentTime, setCurrentTimeRaw] = useState(() => {
    try {
      const v = parseFloat(localStorage.getItem('notpetya:t') || '0');
      return isFinite(v) ? Math.max(0, Math.min(1, v)) : 0;
    } catch { return 0; }
  });
  const [activeId, setActiveIdRaw] = useState(() => {
    try { return localStorage.getItem('notpetya:active') || 'e01'; }
    catch { return 'e01'; }
  });
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(1);

  const setCurrentTime = useCallback((t) => {
    setCurrentTimeRaw(t);
    try { localStorage.setItem('notpetya:t', String(t)); } catch {}
  }, []);
  const setActiveId = useCallback((id) => {
    setActiveIdRaw(id);
    try { localStorage.setItem('notpetya:active', id); } catch {}
  }, []);

  useEffect(() => {
    const upcoming = [...events].filter(e => e.t <= currentTime + 0.001);
    if (upcoming.length > 0) {
      const latest = upcoming[upcoming.length - 1];
      if (latest.id !== activeId) setActiveId(latest.id);
    }
  }, [currentTime]);

  useEffect(() => {
    if (!playing) return;
    let raf;
    let last = null;
    const step = (ts) => {
      if (last == null) last = ts;
      const dt = (ts - last) / 1000;
      last = ts;
      setCurrentTimeRaw(prev => {
        const DURATION = 60;
        const next = prev + (dt / DURATION) * speed;
        if (next >= 1) {
          setPlaying(false);
          try { localStorage.setItem('notpetya:t', '1'); } catch {}
          return 1;
        }
        try { localStorage.setItem('notpetya:t', String(next)); } catch {}
        return next;
      });
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [playing, speed]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        const idx = events.findIndex(x => x.id === activeId);
        const next = events[Math.max(0, idx - 1)];
        if (next) { setActiveId(next.id); setCurrentTime(next.t); setPlaying(false); }
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        const idx = events.findIndex(x => x.id === activeId);
        const next = events[Math.min(events.length - 1, idx + 1)];
        if (next) { setActiveId(next.id); setCurrentTime(next.t); setPlaying(false); }
      } else if (e.key === '0' || e.code === 'Home') {
        setCurrentTime(0); setActiveId('e01'); setPlaying(false);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeId, events]);

  const active = events.find(e => e.id === activeId);
  const firedCount = events.filter(e => e.t <= currentTime).length;

  const [vw, setVw] = useState(() => typeof window !== 'undefined' ? window.innerWidth : 1400);
  useEffect(() => {
    const onR = () => setVw(window.innerWidth);
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, []);
  const compact = vw < 1400;
  const leftW = compact ? 220 : 280;
  const rightW = compact ? 360 : 460; // globe column
  const centerMin = compact ? 380 : 460; // detail column

  const damageTotal = useMemo(() => {
    let total = 0;
    if (currentTime > 0.68) total = Math.min(15000, 10000 + (currentTime - 0.68) * 15000);
    else if (currentTime > 0.44) total = (currentTime - 0.44) * 42000;
    return total;
  }, [currentTime]);

  const currentPhase = phases.find(p => currentTime >= p.start && currentTime < p.end) || phases[phases.length - 1];

  return (
    <div style={{
      height: '100vh', width: '100vw',
      display: 'grid',
      gridTemplateRows: 'auto 36vh 1fr',
      gridTemplateColumns: `${leftW}px 1fr ${rightW}px`,
      gap: 0,
      background: '#0d0b08',
      color: '#e6dcc8',
      fontFamily: "'Inter', sans-serif",
      overflow: 'hidden',
    }}>
      {/* Header */}
      <header style={{
        gridColumn: '1 / -1',
        borderBottom: '1px solid rgba(230,220,200,0.12)',
        padding: '14px 28px 12px',
        display: 'flex',
        alignItems: 'center',
        gap: 20,
        background: '#0a0907',
        flexWrap: 'wrap',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{
            width: 10, height: 10, background: '#dc3c28', borderRadius: 1,
            animation: 'pulse 1.6s infinite',
          }}/>
          <div style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 10, letterSpacing: '0.2em', color: 'rgba(230,220,200,0.55)',
            textTransform: 'uppercase',
          }}>CLASSIFIED · DOSSIER 2017-27/06</div>
        </div>

        <div style={{
          fontFamily: "'Fraunces', serif",
          fontSize: 22,
          fontWeight: 500,
          letterSpacing: '-0.01em',
          color: '#f6f1e4',
        }}>
          NotPetya <span style={{ color: 'rgba(230,220,200,0.4)', fontStyle: 'italic', fontWeight: 400 }}>— an incident reconstruction</span>
        </div>

        <div style={{ marginLeft: 'auto', display: 'flex', gap: 24, alignItems: 'center', flexWrap: 'wrap' }}>
          <Stat label="Records" value={`${firedCount} / ${events.length}`} />
          <Stat label="Cumulative damage" value={formatDamage(damageTotal)} accent={damageTotal > 0} />
          <Stat label="Playhead" value={`${Math.round(currentTime * 100)}%`} mono />
        </div>
      </header>

      {/* ───── TIMELINE HERO ROW (1/3 screen height) ───── */}
      <section style={{
        gridColumn: '1 / -1',
        gridRow: '2 / 3',
        background: 'linear-gradient(180deg, #0a0907 0%, #0d0b08 100%)',
        borderBottom: '1px solid rgba(230,220,200,0.12)',
        padding: '22px 40px 24px',
        display: 'flex', flexDirection: 'column',
        gap: 14,
        overflow: 'hidden',
      }}>
        {/* Phase + playback bar */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
          <span style={{
            padding: '4px 12px',
            background: currentPhase.id === 'prelude' ? '#d4a03c' : currentPhase.id === 'detonation' ? '#dc3c28' : '#b4afa5',
            color: '#0a0907',
            fontFamily: "'JetBrains Mono', monospace",
            fontWeight: 700,
            letterSpacing: '0.18em',
            textTransform: 'uppercase',
            fontSize: 10,
          }}>
            ▸ PHASE · {currentPhase.label.split('·')[0].trim()}
          </span>
          <span style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 11,
            letterSpacing: '0.1em',
            color: 'rgba(230,220,200,0.6)',
          }}>{currentPhase.range}</span>

          {active && (
            <span style={{
              marginLeft: 10,
              fontFamily: "'Fraunces', serif",
              fontSize: 15,
              fontStyle: 'italic',
              color: 'rgba(230,220,200,0.72)',
              fontWeight: 400,
            }}>
              <span style={{ color: 'rgba(230,220,200,0.4)' }}>viewing · </span>
              {active.dateLabel}
            </span>
          )}

          <div style={{ marginLeft: 'auto', display: 'flex', gap: 10, alignItems: 'center' }}>
            <PlayButton playing={playing} onClick={() => setPlaying(p => !p)} />
            <button
              onClick={() => { setCurrentTime(0); setActiveId('e01'); setPlaying(false); }}
              style={ctrlBtnStyle}
              title="Reset"
            >⏮</button>
            <SpeedControl speed={speed} setSpeed={setSpeed} />
          </div>
        </div>

        {/* The highlighted timeline */}
        <div style={{ flex: 1, minHeight: 0, display: 'flex', alignItems: 'center' }}>
          <div style={{ width: '100%' }}>
            <TimelineTrack
              events={events}
              phases={phases}
              currentTime={currentTime}
              setCurrentTime={setCurrentTime}
              activeId={activeId}
              setActiveId={setActiveId}
              playing={playing}
              setPlaying={setPlaying}
            />
          </div>
        </div>

        {/* Hints */}
        <div style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 9.5,
          letterSpacing: '0.14em',
          color: 'rgba(230,220,200,0.38)',
          textTransform: 'uppercase',
          textAlign: 'center',
        }}>
          ← → step events &nbsp;·&nbsp; space play/pause &nbsp;·&nbsp; drag track to scrub &nbsp;·&nbsp; click pins to jump
        </div>
      </section>

      {/* ───── ROW 3: left list / center map / right detail ───── */}
      <aside style={{
        gridRow: '3 / 4',
        gridColumn: '1',
        borderRight: '1px solid rgba(230,220,200,0.12)',
        overflow: 'hidden',
        background: 'rgba(10,9,7,0.6)',
        minHeight: 0,
      }}>
        <EventList
          events={events}
          activeId={activeId}
          onSelect={(e) => { setActiveId(e.id); setCurrentTime(e.t); setPlaying(false); }}
          currentTime={currentTime}
        />
      </aside>

      <main style={{
        gridRow: '3 / 4',
        gridColumn: '2',
        overflow: 'hidden',
        background: 'rgba(10,9,7,0.4)',
        minHeight: 0,
        borderRight: '1px solid rgba(230,220,200,0.12)',
      }}>
        <EventDetail event={active} />
      </main>

      <section style={{
        gridRow: '3 / 4',
        gridColumn: '3',
        padding: '20px 24px 22px',
        display: 'flex',
        flexDirection: 'column',
        gap: 12,
        overflow: 'hidden',
        minWidth: 0,
        minHeight: 0,
        background: 'radial-gradient(ellipse at center, rgba(20,18,15,0.8) 0%, rgba(10,9,7,1) 70%)',
      }}>
        <div style={{
          display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 9.5,
          letterSpacing: '0.18em',
          textTransform: 'uppercase',
          color: 'rgba(230,220,200,0.55)',
        }}>
          <span>Incident Globe</span>
          {active && <span style={{ color: 'rgba(230,220,200,0.4)' }}>{active.location.split(',')[0]}</span>}
        </div>

        <div style={{ flex: 1, minHeight: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <WorldMap events={events} currentTime={currentTime} activeEvent={active} />
        </div>

        <div style={{
          display: 'flex', gap: 16, justifyContent: 'center',
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 9.5, letterSpacing: '0.14em', textTransform: 'uppercase',
          color: 'rgba(230,220,200,0.5)',
        }}>
          <LegendDot color="#d4a03c" label="Prelude" />
          <LegendDot color="#dc3c28" label="Detonation" />
          <LegendDot color="#b4afa5" label="Fallout" />
        </div>
      </section>
    </div>
  );
};

const Stat = ({ label, value, accent, mono }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 2, minWidth: 0 }}>
    <span style={{
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase',
      color: 'rgba(230,220,200,0.45)',
    }}>{label}</span>
    <span style={{
      fontFamily: mono !== false ? "'JetBrains Mono', monospace" : "'Inter', sans-serif",
      fontSize: 13,
      fontWeight: 600,
      color: accent ? '#dc3c28' : '#f6f1e4',
      fontVariantNumeric: 'tabular-nums',
    }}>{value}</span>
  </div>
);

const formatDamage = (m) => {
  if (!m || m <= 0) return '—';
  if (m >= 1000) return `$${(m/1000).toFixed(1)}B`;
  return `$${Math.round(m)}M`;
};

const LegendDot = ({ color, label }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
    <div style={{ width: 8, height: 8, borderRadius: '50%', background: color }}/>
    <span>{label}</span>
  </div>
);

const PlayButton = ({ playing, onClick }) => (
  <button
    onClick={onClick}
    style={{
      width: 40, height: 40,
      background: playing ? 'rgba(230,220,200,0.1)' : '#dc3c28',
      border: '1px solid rgba(230,220,200,0.2)',
      color: playing ? '#f6f1e4' : '#0a0907',
      cursor: 'pointer',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      borderRadius: 2,
    }}
    title={playing ? 'Pause (space)' : 'Play (space)'}
  >
    {playing ? (
      <svg width="12" height="14" viewBox="0 0 14 16"><rect x="1" y="0" width="4" height="16" fill="currentColor"/><rect x="9" y="0" width="4" height="16" fill="currentColor"/></svg>
    ) : (
      <svg width="12" height="14" viewBox="0 0 14 16"><path d="M1 0 L13 8 L1 16 Z" fill="currentColor"/></svg>
    )}
  </button>
);

const ctrlBtnStyle = {
  width: 34, height: 34,
  background: 'rgba(230,220,200,0.04)',
  border: '1px solid rgba(230,220,200,0.14)',
  color: 'rgba(230,220,200,0.7)',
  cursor: 'pointer',
  fontSize: 14,
  fontFamily: "'JetBrains Mono', monospace",
  borderRadius: 2,
};

const SpeedControl = ({ speed, setSpeed }) => {
  const speeds = [1, 2, 4, 8];
  return (
    <div style={{ display: 'flex', gap: 1, fontFamily: "'JetBrains Mono', monospace", fontSize: 10 }}>
      {speeds.map(s => (
        <button
          key={s}
          onClick={() => setSpeed(s)}
          style={{
            padding: '8px 10px',
            background: speed === s ? '#e6dcc8' : 'rgba(230,220,200,0.04)',
            color: speed === s ? '#0a0907' : 'rgba(230,220,200,0.7)',
            border: '1px solid rgba(230,220,200,0.14)',
            cursor: 'pointer',
            fontWeight: speed === s ? 700 : 500,
            borderRadius: 0,
          }}
        >{s}×</button>
      ))}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
